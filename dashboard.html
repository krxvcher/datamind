<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatsFai — Личный кабинет</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#07070b;--s1:#0d0d13;--s2:#131318;--s3:#1a1a22;--s4:#22222c;
  --b1:rgba(255,255,255,0.045);--b2:rgba(255,255,255,0.085);--b3:rgba(255,255,255,0.14);
  --a1:#7b9cff;--a2:#35e8c3;--a3:#ff6584;--a4:#f5a623;
  --gold:#d4a843;--gold2:#e8c56a;--gdim:rgba(212,168,67,0.1);--gborder:rgba(212,168,67,0.22);
  --t1:#ffffff;--t2:#d8d8e8;--t3:#9898b0;--t4:#4a4a62;
  --r:14px;--r2:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 8% 0%,rgba(123,156,255,0.045) 0%,transparent 58%),
    radial-gradient(ellipse 60% 40% at 92% 15%,rgba(212,168,67,0.035) 0%,transparent 55%);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px;}

/* HEADER */
header{position:sticky;top:0;z-index:50;display:flex;align-items:center;
  justify-content:space-between;padding:0 40px;height:56px;
  background:rgba(7,7,11,0.88);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--b2);}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-mark{width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#07070b;
  box-shadow:0 0 16px rgba(212,168,67,.28);}
.logo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1);}
.logo-text span{color:var(--gold2);}
.header-right{display:flex;align-items:center;gap:8px;}
.user-email{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);}
.logout-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:400;cursor:pointer;transition:all .15s;}
.logout-btn:hover{border-color:rgba(255,101,132,.35);color:var(--a3);}
.new-btn{padding:7px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#07070b;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;text-decoration:none;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 4px 16px rgba(212,168,67,.2);}
.new-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,168,67,.3);}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:36px 24px 80px;position:relative;z-index:1;}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:-.5px;margin-bottom:24px;color:var(--t1);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:14px 16px 12px;transition:border-color .15s;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.stat-card:hover{border-color:var(--b2);}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;
  color:var(--t1);margin-bottom:3px;letter-spacing:-1px;line-height:1;}
.stat-val.gold{color:var(--gold2);}
.stat-val.teal{color:var(--a2);}
.stat-val.blue{color:var(--a1);}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:400;
  color:var(--t3);text-transform:uppercase;letter-spacing:.8px;}

/* SECTION HEADER */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:400;
  color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;}
.section-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
  padding:3px 9px;background:var(--s2);border-radius:6px;border:1px solid var(--b1);}

/* FILTERS */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--b2);
  background:transparent;color:var(--t3);font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:400;cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--b2);color:var(--t2);}
.filter-btn.active{border-color:var(--gborder);background:var(--gdim);color:var(--gold2);}

/* ANALYSIS CARDS */
.analyses-list{display:flex;flex-direction:column;gap:8px;}
.an-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  overflow:hidden;transition:border-color .15s;cursor:pointer;}
.an-card:hover{border-color:var(--b2);}
.an-card.expanded{border-color:var(--gborder);}
.an-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.an-icon{width:34px;height:34px;border-radius:9px;background:var(--s2);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.an-info{flex:1;min-width:0;}
.an-title{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);}
.an-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-top:3px;}
.an-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.an-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
.an-del{width:28px;height:28px;border-radius:7px;border:1px solid var(--b1);
  background:transparent;color:var(--t4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
.an-del:hover{border-color:rgba(255,101,132,.35);color:var(--a3);background:rgba(255,101,132,.06);}
.an-body{display:none;padding:0 16px 16px;}
.an-card.expanded .an-body{display:block;}

/* niche pills */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;
  font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.5px;text-transform:uppercase;}
.pill-ecom{background:rgba(123,156,255,.1);color:var(--a1);}
.pill-cafe{background:rgba(212,168,67,.1);color:var(--gold2);}
.pill-freelance{background:rgba(53,232,195,.08);color:var(--a2);}
.pill-retail{background:rgba(255,101,132,.1);color:var(--a3);}
.pill-content{background:rgba(160,100,255,.1);color:#b07fff;}

/* REPORT IN CARD */
.report-wrap{background:var(--s2);border-radius:var(--r2);overflow:hidden;border:1px solid var(--b1);}
.report-top{height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.report-scroll{padding:14px 16px;max-height:440px;overflow-y:auto;}
.rsec{margin-bottom:8px;border-radius:9px;overflow:hidden;border:1px solid var(--b1);}
.rsec:last-child{margin-bottom:0;}
.shead{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s3);}
.sico{font-size:12px;}
.sname{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  color:var(--t1);letter-spacing:.8px;text-transform:uppercase;}
.sbody{padding:10px 12px;}
.sbody p {margin-bottom:5px;}
.brow{display:flex;gap:8px;align-items:flex-start;padding:5px 9px;
  margin-bottom:3px;border-radius:6px;background:rgba(255,255,255,.02);}
.barr{color:var(--gold2);font-size:10px;flex-shrink:0;
  font-family:'DM Mono',monospace;margin-top:2px;}
.btxt{font-size:12px;color:var(--t2);line-height:1.65;font-weight:300;}
.kw{color:var(--t1);font-weight:600;}
.report-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--b1);}
.ract{padding:6px 13px;border-radius:7px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:400;cursor:pointer;transition:all .15s;}
.ract:hover{border-color:var(--gborder);color:var(--gold2);}

/* INPUT DATA */
.input-section{margin-top:10px;}
.input-toggle{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
  cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;
  gap:5px;letter-spacing:.5px;text-transform:uppercase;}
.input-toggle:hover{color:var(--t2);}
.input-data{display:none;background:var(--s3);border-radius:9px;padding:12px;margin-top:8px;}
.input-data.open{display:block;}
.input-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px;}
.input-row:last-child{border-bottom:none;}
.input-key{color:var(--t4);min-width:120px;font-family:'DM Mono',monospace;font-size:10px;}
.input-val{color:var(--t2);font-weight:300;}

/* EMPTY STATE */
.empty{text-align:center;padding:64px 24px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;
  margin-bottom:8px;color:var(--t1);}
.empty-sub{font-size:14px;color:var(--t2);margin-bottom:24px;font-weight:300;}
.empty-btn{display:inline-block;padding:12px 24px;border-radius:11px;border:none;
  background:linear-gradient(135deg,var(--gold2),var(--gold));color:#07070b;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;text-decoration:none;transition:all .2s;
  box-shadow:0 6px 20px rgba(212,168,67,.2);}
.empty-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(212,168,67,.3);}

/* LOADING */
.loading{text-align:center;padding:60px 24px;color:var(--t2);font-size:14px;font-weight:300;}
.spinner{width:32px;height:32px;border:1.5px solid var(--b2);
  border-top-color:var(--gold2);border-radius:50%;
  animation:spin .9s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DELETE CONFIRM */
.del-confirm{display:none;position:fixed;inset:0;background:rgba(7,7,11,.88);
  backdrop-filter:blur(10px);z-index:200;align-items:center;justify-content:center;padding:24px;}
.del-confirm.visible{display:flex;}
.del-box{background:var(--s1);border:1px solid rgba(255,101,132,.2);border-radius:18px;
  padding:32px;max-width:360px;width:100%;text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,.6);}
.del-box h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  margin-bottom:8px;color:var(--t1);}
.del-box p{font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6;font-weight:300;}
.del-btns{display:flex;gap:10px;}
.del-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:400;cursor:pointer;transition:all .15s;}
.del-cancel:hover{border-color:var(--b3);color:var(--t1);}
.del-ok{flex:1;padding:11px;border-radius:10px;border:none;background:var(--a3);
  color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;}
.del-ok:hover{opacity:.9;}

@media(max-width:640px){
  header{padding:0 14px;height:52px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .an-date{display:none;}
  main{padding:20px 14px 60px;}
}

@media(max-width:480px){
  /* ── HEADER ── */
  header{padding:0 12px;height:50px;}
  .logo-text{font-size:15px;}
  .header-right{gap:5px;}
  /* Email слишком длинный — скрываем на маленьких */
  .user-email{display:none;}
  .new-btn{padding:7px 12px;font-size:12px;}
  .logout-btn{padding:5px 10px;font-size:12px;}

  /* ── MAIN ── */
  main{padding:16px 12px 60px;}

  /* ── STATS ── */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px;}
  .stat-card{padding:12px 10px 10px;}
  .stat-val{font-size:18px;}
  .stat-label{font-size:8px;letter-spacing:.5px;}

  /* ── FILTERS ── */
  .filter-bar{margin-bottom:14px;}
  .filter-pills{gap:5px;flex-wrap:wrap;}
  .fpill{padding:5px 10px;font-size:11px;}

  /* ── HISTORY HEADER ── */
  .history-header{flex-direction:row;align-items:center;margin-bottom:10px;}
  .hist-count{font-size:11px;padding:3px 8px;}

  /* ── ANALYSIS CARDS ── */
  .an-card{border-radius:10px;}
  .an-card-head{padding:12px 12px;gap:9px;}
  .an-icon{width:30px;height:30px;font-size:14px;border-radius:7px;}
  .an-title{font-size:12px;}
  .an-meta{font-size:9px;}
  .an-del{font-size:10px;padding:3px 6px;}

  /* ── REPORT ── */
  .report-wrap{border-radius:10px;}
  .report-scroll{padding:12px 12px;max-height:360px;}
  .report-actions{padding:8px 12px;gap:5px;flex-wrap:wrap;}
  .ract{font-size:11px;padding:5px 9px;}

  /* ── REPORT CONTENT ── */
  .rsec{margin-bottom:12px;}
  .shead{padding:7px 10px;}
  .sname{font-size:10px;}
  .sbody{padding:8px 10px;}
  .btxt{font-size:12px;}
  .brow{gap:6px;padding:4px 0;}
}
</style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-mark">S</div>
    <div class="logo-text">Stats<span>Fai</span></div>
  </a>
  <div class="header-right">
    <span class="user-email" id="user-email"></span>
    <a class="new-btn" href="/">✦ Новый анализ</a>
    <button class="logout-btn" onclick="doLogout()">Выйти</button>
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val blue" id="stat-total">—</div>
      <div class="stat-label">Всего анализов</div>
    </div>
    <div class="stat-card">
      <div class="stat-val teal" id="stat-week">—</div>
      <div class="stat-label">За эту неделю</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-top-niche" style="font-size:26px;line-height:1;">—</div>
      <div class="stat-val-sub" id="stat-top-label" style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px;min-height:18px;"></div>
      <div class="stat-label">Топ ниша</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-last">—</div>
      <div class="stat-label">Последний анализ</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterBy('all', this)">Все</button>
    <button class="filter-btn" onclick="filterBy('ecom', this)">🛒 Интернет-магазин</button>
    <button class="filter-btn" onclick="filterBy('cafe', this)">☕ Кафе</button>
    <button class="filter-btn" onclick="filterBy('freelance', this)">💼 Фриланс</button>
    <button class="filter-btn" onclick="filterBy('retail', this)">🏪 Розница</button>
    <button class="filter-btn" onclick="filterBy('content', this)">🎬 Контент</button>
  </div>

  <!-- LIST -->
  <div class="section-head">
    <div class="section-title">История анализа</div>
    <div class="section-count" id="list-count">0 записей</div>
  </div>

  <div id="list-container">
    <div class="loading">
      <div class="spinner"></div>
      Загружаем историю…
    </div>
  </div>
</main>

<!-- DELETE CONFIRM -->
<div class="del-confirm" id="del-confirm">
  <div class="del-box">
    <h3>Удалить анализ?</h3>
    <p>Это действие нельзя отменить. Анализ будет удалён безвозвратно.</p>
    <div class="del-btns">
      <button class="del-cancel" onclick="closeDelConfirm()">Отмена</button>
      <button class="del-ok" onclick="confirmDelete()">Удалить</button>
    </div>
  </div>
</div>

<script>
// ── ЗАМЕНИ ЭТИ ЗНАЧЕНИЯ ───────────────────────────────────────────────────────
const SUPA_URL  = 'https://puzfykbmphicudyqvafz.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1emZ5a2JtcGhpY3VkeXF2YWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzQ5ODUsImV4cCI6MjA4ODQxMDk4NX0.oWI_2XcyVHLbTELHcLizT4hQ2eQgTMcn7p4YMfUQ4jU';
// ─────────────────────────────────────────────────────────────────────────────

const { createClient } = window.supabase;
const sb = createClient(encodeURI(SUPA_URL), SUPA_ANON.trim());

let allAnalyses = [];
let pendingDeleteId = null;
let currentFilter = 'all';

const NICHE_ICONS = { ecom:'🛒', cafe:'☕', freelance:'💼', retail:'🏪', content:'🎬' };
const NICHE_LABELS = { ecom:'Интернет-магазин', cafe:'Кафе / Ресторан', freelance:'Услуги / Фриланс', retail:'Розница', content:'Контент / Вирал' };

// ── AUTH CHECK ────────────────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/auth.html'; return; }
  document.getElementById('user-email').textContent = session.user.email;
  await loadAnalyses();
})();

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = '/auth.html';
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAnalyses() {
  const { data, error } = await sb
    .from('analyses')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('list-container').innerHTML = `<div class="loading" style="color:var(--a3)">Ошибка загрузки: ${error.message}</div>`;
    return;
  }
  allAnalyses = data || [];
  updateStats();
  renderList(currentFilter);
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = allAnalyses.length;
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
  const week = allAnalyses.filter(a => new Date(a.created_at) > weekAgo).length;

  // Top niche
  const nicheCounts = {};
  allAnalyses.forEach(a => { nicheCounts[a.niche] = (nicheCounts[a.niche]||0)+1; });
  const topNiche = Object.entries(nicheCounts).sort((a,b)=>b[1]-a[1])[0];

  // Last date
  const last = allAnalyses[0] ? formatDate(allAnalyses[0].created_at) : '—';

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-week').textContent = week;
  document.getElementById('stat-top-niche').innerHTML = topNiche ? `<span style="font-size:20px">${NICHE_ICONS[topNiche[0]]||''}</span>` : '—';
  document.getElementById('stat-top-label').textContent = topNiche ? (NICHE_LABELS[topNiche[0]]||topNiche[0]) : '';
  document.getElementById('stat-last').textContent = last;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterBy(niche, btn) {
  currentFilter = niche;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(niche);
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(filter) {
  const items = filter === 'all' ? allAnalyses : allAnalyses.filter(a => a.niche === filter);
  document.getElementById('list-count').textContent = `${items.length} ${plural(items.length, 'запись','записи','записей')}`;

  if (!items.length) {
    document.getElementById('list-container').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📊</div>
        <div class="empty-title">${filter === 'all' ? 'Аналитики пока нет' : 'В этой категории пусто'}</div>
        <div class="empty-sub">Запусти первый анализ — он сохранится здесь автоматически</div>
        <a class="empty-btn" href="/">✦ Создать анализ</a>
      </div>`;
    return;
  }

  document.getElementById('list-container').innerHTML = `<div class="analyses-list">${items.map(a => renderCard(a)).join('')}</div>`;
}

function renderCard(a) {
  const icon = NICHE_ICONS[a.niche] || '📊';
  const nicheLabel = a.niche_label || NICHE_LABELS[a.niche] || a.niche;
  const pillClass = `pill pill-${a.niche}`;
  const date = formatDate(a.created_at);
  const preview = (a.result_text||'').replace(/\*\*(.*?)\*\*/g,'$1').replace(/^#{1,4}\s*/gm,'').substring(0,120)+'…';

  return `<div class="an-card" id="card-${a.id}">
    <div class="an-card-head" onclick="toggleCard('${a.id}')">
      <div class="an-icon">${icon}</div>
      <div class="an-info">
        <div class="an-title">${a.type_label || a.type}</div>
        <div class="an-meta"><span class="${pillClass}">${nicheLabel}</span> &nbsp;${a.currency||'USD'} · ${a.region||'Global'}</div>
      </div>
      <div class="an-actions">
        <div class="an-date">${date}</div>
        <button class="an-del" onclick="event.stopPropagation();askDelete('${a.id}')" title="Удалить">✕</button>
      </div>
    </div>
    <div class="an-body" id="body-${a.id}">
      <div class="report-wrap">
        <div class="report-top"></div>
        <div class="report-scroll">${formatReport(a.result_text||'')}</div>
        <div class="report-actions">
          <button class="ract" onclick="copyReport('${a.id}')">📋 Копировать</button>
          <button class="ract" onclick="exportExcel('${a.id}')">📊 Excel</button>
          <button class="ract" onclick="exportPDF('${a.id}')">📄 PDF</button>
        </div>
      </div>
      ${renderInputData(a.input_data)}
    </div>
  </div>`;
}

function renderInputData(inputData) {
  if (!inputData || !Object.keys(inputData).length) return '';
  const rows = Object.entries(inputData)
    .filter(([,v]) => v && v !== '0' && v !== 'не указано')
    .map(([k,v]) => `<div class="input-row"><div class="input-key">${k}</div><div class="input-val">${v}</div></div>`)
    .join('');
  return `<div class="input-section">
    <div class="input-toggle" onclick="this.nextElementSibling.classList.toggle('open')">▸ Введённые данные</div>
    <div class="input-data">${rows}</div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('expanded');
}

function copyReport(id) {
  const a = allAnalyses.find(x => x.id === id);
  if (!a) return;
  navigator.clipboard.writeText(a.result_text || '').then(() => {
    const btn = document.querySelector(`#card-${id} .ract`);
    if (btn) { btn.textContent = '✓ Скопировано'; setTimeout(()=>btn.textContent='📋 Копировать',2000); }
  });
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function askDelete(id) {
  pendingDeleteId = id;
  document.getElementById('del-confirm').classList.add('visible');
}
function closeDelConfirm() {
  pendingDeleteId = null;
  document.getElementById('del-confirm').classList.remove('visible');
}
async function confirmDelete() {
  if (!pendingDeleteId) return;
  const { error } = await sb.from('analyses').delete().eq('id', pendingDeleteId);
  closeDelConfirm();
  if (!error) {
    allAnalyses = allAnalyses.filter(a => a.id !== pendingDeleteId);
    updateStats();
    renderList(currentFilter);
  }
}

// ── FORMAT REPORT ─────────────────────────────────────────────────────────────
function formatReport(text) {
  text = text.replace(/^#{1,4}\s*/gm,'').trim();
  const icons = {'ОЦЕНКА':'📊','ОБЩАЯ':'📊','ФИНАНСОВ':'💰','МЕТРИК':'📈','РАБОТАЕТ':'✅','ПРОБЛЕМ':'⚠️','ДЕЙСТВИ':'🎯','РЕКОМЕНД':'💡','ПЛАН':'🗓️','ПРОГНОЗ':'🔮','СТРАТЕГ':'🚀','КЛИЕНТ':'🤝','ТРАФИК':'👥','МЕНЮ':'🍽️','АНАЛИЗ':'📊','ХУКИ':'🎣','КОНТЕНТ':'📱','ИДЕИ':'💡','РОСТ':'📈','ТРЕНДЫ':'🔥','МОНЕТИЗ':'💰','SEO':'🔍','АУДИТ':'🔎'};
  function ico(t){const u=t.toUpperCase();for(const[k,v]of Object.entries(icons))if(u.includes(k))return v;return'◆';}
  const parts = text.split(/\*\*(.*?)\*\*/g);
  let html = '';
  if (parts[0].trim()) html += `<div class="sbody"><p>${parts[0].trim()}</p></div>`;
  for (let i=1; i<parts.length; i+=2) {
    const title = parts[i].trim().replace(/^#+\s*/,'');
    const body  = (parts[i+1]||'').trim().replace(/^#{1,4}\s*/gm,'');
    if (!title) continue;
    const lines = body.split('\n').filter(l=>l.trim());
    const bhtml = lines.map(line => {
      const t = line.trim().replace(/^#{1,4}\s*/,'');
      if (!t) return '';
      if (/^[–\-•]\s/.test(t)) {
        const c = t.replace(/^[–\-•]\s*/,'');
        const fmt = c.replace(/^([^:：]+[:：])/,'<span class="kw">$1</span>');
        return `<div class="brow"><span class="barr">→</span><span class="btxt">${fmt}</span></div>`;
      }
      if (/^\d+\.\s/.test(t)) {
        const num = t.match(/^(\d+\.)/)[1];
        const rest = t.replace(/^\d+\.\s*/,'');
        const fmt = rest.replace(/^([^:：]+[:：])/,'<span class="kw">$1</span>');
        return `<div class="brow"><span class="barr" style="color:var(--gold2);min-width:18px;">${num}</span><span class="btxt">${fmt}</span></div>`;
      }
      return `<p>${t}</p>`;
    }).join('');
    html += `<div class="rsec"><div class="shead"><span class="sico">${ico(title)}</span><span class="sname">${title}</span></div><div class="sbody">${bhtml||'<p>—</p>'}</div></div>`;
  }
  return html || `<div class="sbody"><p>${text}</p></div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)   return 'только что';
  if (diff < 3600) return Math.floor(diff/60)+' мин назад';
  if (diff < 86400) return Math.floor(diff/3600)+' ч назад';
  if (diff < 172800) return 'вчера';
  return d.toLocaleDateString('ru-RU', {day:'numeric',month:'short'});
}
function plural(n, one, two, five) {
  const m = n % 100;
  if (m >= 11 && m <= 19) return `${n} ${five}`;
  const m2 = n % 10;
  if (m2 === 1) return `${n} ${one}`;
  if (m2 >= 2 && m2 <= 4) return `${n} ${two}`;
  return `${n} ${five}`;
}

// ── EXPORT FROM DASHBOARD ────────────────────────────────────────────────────
function exportExcel(id) {
  const a = allAnalyses.find(x => x.id === id);
  if (!a || !window.XLSX) return;
  const lines = (a.result_text||'')
    .replace(/\*\*(.*?)\*\*/g,'[$1]')
    .split('\n').filter(l=>l.trim())
    .map(l => [l.trim()]);
  const ws = XLSX.utils.aoa_to_sheet([
    [`${a.type_label||a.type} — ${a.niche_label||a.niche}`],
    [`${a.currency||'USD'} · ${a.region||'Global'}`],
    [],
    ...lines
  ]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Анализ');
  XLSX.writeFile(wb, `StatsFai_${(a.type_label||'report').replace(/\s+/g,'_')}.xlsx`);
}

function exportPDF(id) {
  const a = allAnalyses.find(x => x.id === id);
  if (!a || !window.jspdf) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const margin = 15, lineH = 6, pageW = 210 - margin*2;
  let y = 20;
  const addText = (txt, size, bold, color) => {
    doc.setFontSize(size||11);
    doc.setFont('helvetica', bold?'bold':'normal');
    if(color) doc.setTextColor(...color); else doc.setTextColor(220,220,230);
    const lines = doc.splitTextToSize(txt, pageW);
    lines.forEach(line => {
      if (y > 275) { doc.addPage(); y = 20; }
      doc.text(line, margin, y);
      y += lineH;
    });
  };
  // dark background
  doc.setFillColor(7,7,11);
  doc.rect(0,0,210,297,'F');
  // title
  addText('StatsFai — Результаты анализа', 16, true, [232,197,106]);
  y += 3;
  addText(`${a.type_label||a.type}  ·  ${a.niche_label||a.niche}  ·  ${a.currency||'USD'}`, 10, false, [120,120,144]);
  y += 5;
  // body
  const text = (a.result_text||'').replace(/\*\*(.*?)\*\*/g,'■ $1').split('\n');
  text.forEach(line => {
    const t = line.trim();
    if (!t) { y += 2; return; }
    if (t.startsWith('■ ')) {
      y += 3;
      addText(t.replace('■ ',''), 11, true, [232,197,106]);
    } else if (/^[–\-]\s/.test(t)) {
      addText('  ' + t, 10, false, [194,194,212]);
    } else {
      addText(t, 10, false, [194,194,212]);
    }
  });
  doc.save(`StatsFai_${(a.type_label||'report').replace(/\s+/g,'_')}.pdf`);
}
